services:
    php-apache:
        image: php:8.3-apache
        ports:
            - 80:80
        volumes:
            - ./DocumentRoot:/var/www/html:z
        depends_on:
            - mariadb

    mariadb:
        image: mariadb:11
        volumes:
            - mariadb:/var/lib/mysql
        environment:
            TZ: "Europe/Rome"
            MYSQL_ALLOW_EMPTY_PASSWORD: "no"
            MYSQL_ROOT_PASSWORD: "rootpwd"
            MYSQL_USER: 'testuser'
            MYSQL_PASSWORD: 'testpassword'
            MYSQL_DATABASE: 'testdb'

volumes:
    mariadb:
